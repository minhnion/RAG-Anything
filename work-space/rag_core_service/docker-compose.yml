services:
  rag-core:
    build:
      context: ../..
      dockerfile: work-space/rag_core_service/Dockerfile
    env_file:
      - .env
    environment:
      RAG_CORE_DATA_DIR: /data
      RAG_CORE_LOG_DIR: /data/logs
    ports:
      - "7220:7220"
    volumes:
      - ./data:/data
      - ./config/defaults.yaml:/app/work-space/rag_core_service/config/defaults.yaml:ro
    restart: unless-stopped

